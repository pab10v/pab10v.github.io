<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javier Valle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: rgba(255, 255, 255, 0.05);
            --primary: #00f2ff;
            --secondary: #7000ff;
            --text: #ffffff;
            --text-dim: #a0a0c0;
            --accent: #ff007a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Background Effects --- */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(112, 0, 255, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* --- Header --- */
        header {
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Hero --- */
        .hero {
            padding: 6rem 0;
            text-align: center;
        }

        .hero-img {
            max-width: 300px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.3));
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.3)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 50px rgba(112, 0, 255, 0.4)); }
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.4rem;
            color: var(--text-dim);
            max-width: 700px;
            margin: 0 auto 3rem;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.4);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
        }

        /* --- Sections --- */
        section {
            padding: 6rem 0;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 242, 255, 0.2);
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .card p {
            color: var(--text-dim);
        }

        /* --- Architecture --- */
        .arch-box {
            background: #000;
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid var(--secondary);
            font-family: 'JetBrains Mono', monospace;
            overflow-x: auto;
        }

        .arch-line {
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .arch-highlight {
            color: var(--primary);
        }

        /* --- Footer --- */
        footer {
            padding: 4rem 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        /* --- Modal (Implicit for Terms/Privacy) --- */
        .legal-section {
            max-width: 800px;
            margin: 4rem auto;
            background: var(--surface);
            padding: 3rem;
            border-radius: 20px;
            font-size: 0.95rem;
            color: var(--text-dim);
        }

        .legal-section h2 {
            color: var(--text);
            margin-bottom: 1.5rem;
        }

        .legal-section p {
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hero { padding: 4rem 0; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <header>
            <div class="logo">BYE</div>
            <div class="cta-group">
                <!-- -->
            </div>
        </header>

        <section class="hero">
        </section>

        <section id="features">
        </section>

        <section id="architecture">
        </section>

        <footer>
            <div class="footer-links">
            </div>
            <p>&copy; Javier Valle. Distributed under MIT License.</p>
        </footer>
    </div>
</body>
</html>
